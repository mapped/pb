syntax = "proto3";

package mapped.cloud.api.control;

option java_multiple_files = true;
option java_package = "com.mapped.cloud.api.control";
option csharp_namespace = "Mapped.Cloud.Api.Control";
option go_package = "go.mapped.dev/pb/cloud/api/control;control";

import "mapped/cloud/types/typed_value.proto";
import "mapped/cloud/types/control.proto";
import "google/protobuf/wrappers.proto";

message WritePropRequest {
    // The property value(s) to write
    PointReferenceAndValue payload = 1;

    // The timeout for each request to each subtended device in milliseconds
    // NOTE: UGAgent makes every attempt to parallelize these, but some devices don't support
    //       writing multiple properties at once, which means write requests must be serialized
    uint32 timeout_in_ms = 2;


    // A list of [delay, mappingKeys] to poll after a successful write
    repeated PostWritePollRequest post_write_poll_requests = 3;

    // Simulate the command by only validating the input and logging
    // do not send an actual command over the wire
    bool simulate = 100;
}

message WritePropResponse {
    // The unique ID of this request to be provided to Mapped Support
    // for troubleshooting in the case of unexpected errors
    string request_id = 1;
  
    // The result of each property write
    PointReferenceAndResult payload = 2;
}

message PointReferenceAndValue {
    // The `point.id` or `point.mappingKey` where the value originated from or is to be written to
    string point_reference_id = 1;

    // The value read or to be written 
    // NOTE: The value *type* must NOT change type between a read and a write
    mapped.cloud.types.TypedValue value = 2;

    // [optional]
    // If writing to a single array index, this is the ZERO-BASED index to write to
    //  - For BACnet, this can be either a priority or an array index - but note that it is zero-based
    //    vs BACnet which is one-based (zero in BACnet is the array length), so passing 0 here will write 
    //    to BACnet priority 1, and passing 1 here will write to BACnet priority 2, etc...
    google.protobuf.UInt32Value index = 10;

}

message PointReferenceAndResult {
    // The `point.id` or `point.mappingKey` provided to the write request
    string point_reference_id = 1;

    // The result code
    mapped.cloud.types.ControlResult result = 2;

    // Error description (if available)
    string error_description = 3;

    // Protocol-specific error class, for protocols that split class/code - like BACnet
    int64 connector_error_class = 4;

    // Protocol-specific error code
    int64 connector_error_code = 5;
}

message PostWritePollRequest {
    // How long to wait after a write operation before polling the list of point references
    // for updated values? Must be greater than `0`.
    uint32 delay_seconds = 1;

    // The list of point references (id or mappingKey) that should be polled after delay_seconds
    // ... for point reference entries in the list that do not include a specific property, the
    //     default set of "polling" properties for the associated protocols is polled. In
    //     the case of bacnet that is `polling_properties` (or `[85]` if that is not set)
    repeated string point_reference_ids = 2;
}


